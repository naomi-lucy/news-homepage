<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers Product Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- ================= HEADER ================= -->
        <header>
            <div class="left-nav">
                <h2 class="logo">sneakers</h2>
                <nav>
                    <ul>
                        <li><a href="#">Collections</a></li>
                        <li><a href="#">Men</a></li>
                        <li><a href="#">Women</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>
            <div class="right-nav">
                <i class="fa-solid fa-cart-shopping cart"></i>
                <img src="mary.jpg"
                     class="avatar"
                     alt="Avatar">
            </div>
        </header>
        <!-- ================= MAIN ================= -->
        <main>
            <!-- LEFT SIDE -->
            <section class="gallery">
                <div class="main-image">
                    <img src="lucy.png"
                         alt="Product">
                </div>
                <div class="thumbnails">
                    <img src="lucy.png">
                    <img src="beauty.png">
                    <img src="blessed.png">
                    <img src="naaa.png">
                </div>
            </section>
            <!-- RIGHT SIDE -->
            <section class="details">
                <span class="company">
                    Sneaker Company
                </span>
                <h1>
                    Fall Limited Edition Sneakers
                </h1>
                <p>
                    These low-profile sneakers are your perfect casual wear
                    companion. Featuring a durable rubber outer sole,
                    they'll withstand everything the weather can offer.
                </p>
                <div class="price-section">
                    <div class="price">
                        <h2>$125.00</h2>
                        <span>50%</span>
                    </div>
                    <del>$250.00</del>
                </div>
                <div class="buttons">
                    <div class="quantity">
                        <i class="fa-solid fa-minus"></i>
                        <span>0</span>
                        <i class="fa-solid fa-plus"></i>
                    </div>
                    <button>
                        <i class="fa-solid fa-cart-shopping"></i>
                        Add to cart
                    </button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
